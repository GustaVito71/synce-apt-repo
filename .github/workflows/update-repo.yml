name: Update APT Repository

on:
  push:
    branches: [main]
    paths:
      - 'incoming/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install reprepro
        run: sudo apt-get install -y reprepro

      - name: Import GPG key
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "trust-model always" > ~/.gnupg/gpg.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent || true
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "test" | gpg --batch --yes \
            --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
            --pinentry-mode loopback -u "${{ secrets.GPG_KEY_ID }}" \
            --sign --output /tmp/gpgtest -

      - name: Add packages to repo
        run: |
          for deb in incoming/bookworm/*.deb; do
            [ -f "$deb" ] || continue
            reprepro -b . includedeb bookworm "$deb"
          done

      - name: Export public key
        run: |
          gpg --armor --export "${{ secrets.GPG_KEY_ID }}" > public.key

      - name: Generate index.html
        run: |
          REPO_URL="https://gustavito71.github.io/synce-apt-repo"
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          cat > index.html <<EOF
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>SynCE Legacy — APT Repository</title>
            <style>
              body { font-family: monospace; max-width: 860px; margin: 2em auto; padding: 0 1em; background: #1e1e1e; color: #d4d4d4; }
              h1 { color: #9cdcfe; } h2 { color: #ce9178; border-bottom: 1px solid #444; padding-bottom: .3em; }
              a { color: #4ec9b0; } code { background: #2d2d2d; padding: .2em .4em; border-radius: 3px; }
              pre { background: #2d2d2d; padding: 1em; border-radius: 5px; overflow-x: auto; }
              table { border-collapse: collapse; width: 100%; } td, th { padding: .4em .8em; text-align: left; }
              th { color: #9cdcfe; border-bottom: 1px solid #444; } tr:hover td { background: #2d2d2d; }
              .badge { display:inline-block; background:#0e639c; color:#fff; padding:.1em .5em; border-radius:3px; font-size:.85em; }
            </style>
          </head>
          <body>
          <h1>SynCE Legacy — APT Repository</h1>
          <p>Puerto del stack SynCE para <span class="badge">Debian 12 Bookworm</span> &nbsp;·&nbsp; Actualizado: ${DATE}</p>

          <h2>Configuración</h2>
          <pre># 1. Importar la clave GPG
          wget -qO- ${REPO_URL}/public.key | sudo tee /etc/apt/trusted.gpg.d/synce.asc

          # 2. Agregar el repositorio
          echo "deb ${REPO_URL} bookworm main" | sudo tee /etc/apt/sources.list.d/synce.list

          # 3. Actualizar e instalar
          sudo apt update
          sudo apt install synce-sync-engine synce-tools synce-dccm python3-rapi2</pre>

          <h2>Paquetes disponibles</h2>
          <table>
          <tr><th>Paquete</th><th>Versión</th><th>Descripción</th></tr>
          EOF

          reprepro -b . list bookworm | sort | awk '{print $2, $3}' | while read pkg ver; do
            echo "  <tr><td><code>${pkg}</code></td><td>${ver}</td></tr>" >> index.html
          done

          cat >> index.html <<EOF
          </table>

          <h2>Archivos</h2>
          <ul>
            <li><a href="dists/bookworm/Release">dists/bookworm/Release</a></li>
            <li><a href="dists/bookworm/InRelease">dists/bookworm/InRelease</a></li>
            <li><a href="public.key">public.key</a> — Clave GPG pública</li>
          </ul>

          <p><a href="https://github.com/GustaVito71/SynCE-legacy">← Repositorio fuente en GitHub</a></p>
          </body></html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: '.github,conf,incoming,README.md'
