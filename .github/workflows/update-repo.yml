name: Update APT Repository

on:
  push:
    branches: [main]
    paths:
      - 'incoming/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install reprepro
        run: sudo apt-get install -y reprepro

      - name: Import GPG key
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "trust-model always" > ~/.gnupg/gpg.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent || true
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "test" | gpg --batch --yes \
            --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
            --pinentry-mode loopback -u "${{ secrets.GPG_KEY_ID }}" \
            --sign --output /tmp/gpgtest -

      - name: Add packages to repo
        run: |
          for deb in incoming/bookworm/*.deb; do
            [ -f "$deb" ] || continue
            reprepro -b . includedeb bookworm "$deb"
          done

      - name: Export public key
        run: |
          gpg --armor --export "${{ secrets.GPG_KEY_ID }}" > public.key

      - name: Generate index.html
        env:
          GOATCOUNTER_SITE: ${{ vars.GOATCOUNTER_SITE }}
        run: python3 << 'PYEOF'
import os, glob, datetime

REPO_URL = "https://gustavito71.github.io/synce-apt-repo"
DATE = datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')
GC = os.environ.get('GOATCOUNTER_SITE', '').strip()

# Parse packages from all distributions
packages = []
seen = set()
for pkgfile in sorted(glob.glob('dists/*/main/binary-*/Packages')):
    codename = pkgfile.split('/')[1]
    pkg = ver = desc = ''
    with open(pkgfile) as f:
        for line in f:
            line = line.rstrip('\n')
            if line.startswith('Package: '):
                pkg = line[9:]
            elif line.startswith('Version: '):
                ver = line[9:]
            elif line.startswith('Description: '):
                desc = line[13:]
            elif line == '':
                key = (codename, pkg)
                if pkg and key not in seen:
                    seen.add(key)
                    packages.append((codename, pkg, ver, desc))
                pkg = ver = desc = ''
        if pkg and (codename, pkg) not in seen:
            packages.append((codename, pkg, ver, desc))

packages.sort(key=lambda x: (x[0], x[1]))
dists = sorted(set(p[0] for p in packages))

# Filter buttons
btns = '<button class="fb active" data-dist="" onclick="fd(this)">Todas</button>\n'
for d in dists:
    btns += f'<button class="fb" data-dist="{d}" onclick="fd(this)">{d.capitalize()}</button>\n'

# Table rows
rows = ''
for codename, pkg, ver, desc in packages:
    rows += f'<tr data-dist="{codename}"><td><code>{pkg}</code></td><td>{ver}</td><td>{codename}</td><td>{desc}</td></tr>\n'

# GoatCounter
gc_script = f'<script data-goatcounter="https://{GC}.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>' if GC else ''

html = f"""<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SynCE Legacy — APT Repository</title>
<style>
body{{font-family:monospace;max-width:960px;margin:2em auto;padding:0 1em;background:#1e1e1e;color:#d4d4d4}}
h1{{color:#9cdcfe}}h2{{color:#ce9178;border-bottom:1px solid #444;padding-bottom:.3em}}
a{{color:#4ec9b0}}code{{background:#2d2d2d;padding:.2em .4em;border-radius:3px}}
pre{{background:#2d2d2d;padding:1em;border-radius:5px;overflow-x:auto}}
table{{border-collapse:collapse;width:100%}}td,th{{padding:.4em .8em;text-align:left}}
th{{color:#9cdcfe;border-bottom:1px solid #444}}tr:hover td{{background:#2d2d2d}}
.fb{{background:#2d2d2d;color:#d4d4d4;border:1px solid #444;padding:.3em .9em;border-radius:4px;cursor:pointer;margin:.2em}}
.fb.active{{background:#0e639c;color:#fff;border-color:#0e639c}}
.fb:hover{{background:#3e3e3e}}
</style>
</head>
<body>
<h1>SynCE Legacy — APT Repository</h1>
<p>Puerto del stack SynCE para Debian &nbsp;·&nbsp; Actualizado: {DATE}</p>

<h2>Configuración</h2>
<pre># 1. Importar la clave GPG
wget -qO- {REPO_URL}/public.key | sudo tee /etc/apt/trusted.gpg.d/synce.asc

# 2. Agregar el repositorio (reemplazar CODENAME por bookworm, trixie, etc.)
echo "deb {REPO_URL} CODENAME main" | sudo tee /etc/apt/sources.list.d/synce.list

# 3. Actualizar e instalar
sudo apt update
sudo apt install synce-sync-engine synce-tools synce-dccm python3-rapi2</pre>

<h2>Paquetes disponibles</h2>
<div style="margin-bottom:.8em">{btns}</div>
<table>
<tr><th>Paquete</th><th>Versión</th><th>Distribución</th><th>Descripción</th></tr>
{rows}</table>

<h2>Archivos</h2>
<ul>
  <li><a href="public.key">public.key</a> — Clave GPG pública</li>
  <li><a href="dists/bookworm/InRelease">dists/bookworm/InRelease</a></li>
</ul>

<p><a href="https://github.com/GustaVito71/SynCE-legacy">← Repositorio fuente en GitHub</a></p>

<script>
function fd(btn){{
  const d=btn.dataset.dist;
  document.querySelectorAll('tr[data-dist]').forEach(r=>{{r.style.display=(!d||r.dataset.dist===d)?'':'none'}});
  document.querySelectorAll('.fb').forEach(b=>{{b.classList.toggle('active',b.dataset.dist===d)}});
}}
</script>
{gc_script}
</body></html>"""

with open('index.html','w') as f:
    f.write(html)
print(f"index.html generated: {len(packages)} packages, {len(dists)} distributions")
PYEOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: '.github,conf,incoming,README.md'
